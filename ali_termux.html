<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALI // TERMINAL</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #00f5ff;
    --magenta: #ff00c8;
    --green: #00ff9f;
    --dark: #020c14;
    --mid: #071a2e;
    --text: #a0cfe0;
    --glow-c: 0 0 8px #00f5ff, 0 0 20px #00f5ffaa;
    --glow-m: 0 0 8px #ff00c8, 0 0 20px #ff00c8aa;
    --glow-g: 0 0 8px #00ff9f, 0 0 20px #00ff9faa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,245,255,0.015) 2px,
      rgba(0,245,255,0.015) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Grid background */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .container {
    width: min(720px, 96vw);
    padding: 0 12px;
    position: relative;
    z-index: 10;
  }

  /* ── HEADER ── */
  .header {
    border: 1px solid var(--cyan);
    border-bottom: none;
    padding: 18px 24px 14px;
    position: relative;
    background: linear-gradient(180deg, rgba(0,245,255,0.06) 0%, transparent 100%);
    animation: fadeDown 0.6s ease both;
  }

  .header::before {
    content: '● ● ●';
    position: absolute;
    top: 10px; right: 16px;
    font-size: 10px;
    color: var(--magenta);
    letter-spacing: 4px;
    text-shadow: var(--glow-m);
  }

  .header-label {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--magenta);
    text-shadow: var(--glow-m);
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .name {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(36px, 10vw, 64px);
    font-weight: 900;
    color: var(--cyan);
    text-shadow: var(--glow-c), 0 0 60px #00f5ff55;
    letter-spacing: 8px;
    line-height: 1;
    animation: glitch 6s infinite;
  }

  .tagline {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--green);
    text-shadow: var(--glow-g);
    margin-top: 8px;
  }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, var(--cyan), var(--magenta), var(--cyan));
    box-shadow: 0 0 6px #00f5ff99;
    animation: fadeIn 0.6s 0.3s ease both;
  }

  /* ── PANELS ── */
  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border: 1px solid var(--cyan);
    border-top: none;
    border-bottom: none;
    animation: fadeIn 0.6s 0.5s ease both;
  }

  .panel {
    padding: 18px 24px;
    position: relative;
  }

  .panel + .panel {
    border-left: 1px solid rgba(0,245,255,0.25);
  }

  .panel-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--magenta);
    text-shadow: var(--glow-m);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .panel-value {
    font-size: 15px;
    color: var(--cyan);
    text-shadow: var(--glow-c);
  }

  .panel-value.green {
    color: var(--green);
    text-shadow: var(--glow-g);
  }

  /* ── STATS ── */
  .stats {
    border: 1px solid var(--cyan);
    border-top: none;
    border-bottom: none;
    padding: 16px 24px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    animation: fadeIn 0.6s 0.7s ease both;
  }

  .stat-item {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .stat-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--magenta);
    text-shadow: var(--glow-m);
    text-transform: uppercase;
  }

  .bar-track {
    height: 3px;
    background: rgba(0,245,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--cyan), var(--magenta));
    border-radius: 2px;
    box-shadow: var(--glow-c);
    animation: barLoad 1.2s 1s cubic-bezier(.4,0,.2,1) both;
    transform-origin: left;
  }

  @keyframes barLoad {
    from { transform: scaleX(0); }
    to   { transform: scaleX(1); }
  }

  .stat-val {
    font-size: 11px;
    color: var(--green);
    text-shadow: var(--glow-g);
  }

  /* ── QUOTE ── */
  .quote-block {
    border: 1px solid var(--cyan);
    border-top: none;
    padding: 16px 24px;
    background: linear-gradient(180deg, transparent, rgba(0,245,255,0.03));
    animation: fadeIn 0.6s 0.9s ease both;
  }

  .quote-text {
    font-size: 12px;
    color: var(--text);
    line-height: 1.7;
    letter-spacing: 0.5px;
    border-left: 2px solid var(--magenta);
    padding-left: 14px;
    box-shadow: -6px 0 12px rgba(255,0,200,0.15);
  }

  .quote-text em {
    color: var(--cyan);
    font-style: normal;
    text-shadow: var(--glow-c);
  }

  .quote-attr {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--magenta);
    text-shadow: var(--glow-m);
    margin-top: 10px;
    text-align: right;
  }

  /* ── FOOTER ── */
  .footer {
    border: 1px solid var(--cyan);
    border-top: none;
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(0,245,255,0.03);
    animation: fadeIn 0.6s 1.1s ease both;
  }

  .cursor {
    width: 8px; height: 14px;
    background: var(--cyan);
    box-shadow: var(--glow-c);
    animation: blink 1s step-end infinite;
    flex-shrink: 0;
  }

  .prompt {
    font-size: 11px;
    color: var(--green);
    text-shadow: var(--glow-g);
    letter-spacing: 1px;
    overflow: hidden;
    white-space: nowrap;
    animation: typing 2s 1.5s steps(30) both;
    width: 0;
  }

  /* ── CORNER ACCENTS ── */
  .corner {
    position: fixed;
    width: 40px; height: 40px;
    opacity: 0.5;
  }
  .corner.tl { top: 16px; left: 16px; border-top: 1px solid var(--cyan); border-left: 1px solid var(--cyan); }
  .corner.tr { top: 16px; right: 16px; border-top: 1px solid var(--cyan); border-right: 1px solid var(--cyan); }
  .corner.bl { bottom: 16px; left: 16px; border-bottom: 1px solid var(--cyan); border-left: 1px solid var(--cyan); }
  .corner.br { bottom: 16px; right: 16px; border-bottom: 1px solid var(--cyan); border-right: 1px solid var(--cyan); }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes blink {
    50% { opacity: 0; }
  }
  @keyframes typing {
    to { width: 100%; }
  }
  @keyframes glitch {
    0%, 94%, 100% { text-shadow: var(--glow-c), 0 0 60px #00f5ff55; }
    95% { text-shadow: -2px 0 var(--magenta), 2px 0 var(--green), var(--glow-c); }
    96% { text-shadow: 2px 0 var(--magenta), -2px 0 var(--green), var(--glow-c); }
    97% { text-shadow: var(--glow-c), 0 0 60px #00f5ff55; }
  }
</style>
</head>
<body>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="container">

  <div class="header">
    <div class="header-label">// session initialized</div>
    <div class="name">ALI</div>
    <div class="tagline">SYSTEM ONLINE &nbsp;·&nbsp; ACCESS GRANTED &nbsp;·&nbsp; WELCOME BACK</div>
  </div>

  <div class="divider"></div>

  <div class="panels">
    <div class="panel">
      <div class="panel-label">// date</div>
      <div class="panel-value" id="date-val">—</div>
    </div>
    <div class="panel">
      <div class="panel-label">// time</div>
      <div class="panel-value green" id="time-val">—</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat-item">
      <div class="stat-label">// cpu</div>
      <div class="bar-track"><div class="bar-fill" style="width:42%"></div></div>
      <div class="stat-val" id="cpu-val">42%</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">// ram</div>
      <div class="bar-track"><div class="bar-fill" style="width:67%"></div></div>
      <div class="stat-val" id="ram-val">67%</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">// uptime</div>
      <div class="bar-track"><div class="bar-fill" style="width:85%"></div></div>
      <div class="stat-val" id="uptime-val">—</div>
    </div>
  </div>

  <div class="quote-block">
    <div class="quote-text">
      The quieter you become, the more you are able to <em>hear</em>.
    </div>
    <div class="quote-attr">— RAM DASS</div>
  </div>

  <div class="footer">
    <div class="cursor"></div>
    <div class="prompt">ali@termux:~$ ready_</div>
  </div>

</div>

<script>
  function pad(n) { return String(n).padStart(2,'0'); }

  function updateClock() {
    const now = new Date();
    const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    document.getElementById('date-val').textContent =
      `${days[now.getDay()]} ${pad(now.getDate())} ${months[now.getMonth()]} ${now.getFullYear()}`;
    document.getElementById('time-val').textContent =
      `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  }

  // Fake-live stats (simulate fluctuation)
  function updateStats() {
    const cpu = 30 + Math.floor(Math.random() * 35);
    const ram = 55 + Math.floor(Math.random() * 20);
    document.getElementById('cpu-val').textContent = cpu + '%';
    document.getElementById('ram-val').textContent = ram + '%';

    const ms = Date.now() - window._start;
    const s = Math.floor(ms/1000);
    const m = Math.floor(s/60), sec = s % 60;
    document.getElementById('uptime-val').textContent = `${pad(m)}m ${pad(sec)}s`;
  }

  window._start = Date.now();
  updateClock();
  updateStats();
  setInterval(updateClock, 1000);
  setInterval(updateStats, 3000);
</script>
</body>
</html>
